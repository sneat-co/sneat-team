allowBuilds:
  '@firebase/util': true
  '@parcel/watcher': true
  '@swc/core': true
  core-js: true
  esbuild: true
  less: true
  lmdb: true
  msgpackr-extract: true
  nx: true
  protobufjs: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@sneat/*'
onlyBuiltDependencies:
  - '@firebase/util'
  - '@parcel/watcher'
  - '@swc/core'
  - core-js
  - esbuild
  - less
  - lmdb
  - msgpackr-extract
  - nx
  - protobufjs
  - unrs-resolver
